name: cloud-bot brochure sync

on:
  schedule:
    # Her ~5 dakikada bir (GitHub cron en dusuk aralik 5 dk; yogunlukta gecikebilir).
    # Her kosu: sirasi gelen 1 marketi kontrol eder + kuyruktan zamani gelmisse indirir.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Calisma modu"
        required: false
        default: "normal"
        type: choice
        options:
          - normal       # 1 market kontrol + kuyruk akitma
          - once-all     # tum marketleri kontrol + tum kuyrugu akit (ilk dolum)
          - check-only   # sadece sirasi gelen marketi kontrol et
          - drain-only   # sadece kuyrugu akit
          - test-push    # teshis: tek bir test bildirimi gonder

# Ayni anda tek kosu olsun (state.json commit cakismasini onler).
concurrency:
  group: cloud-bot-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl, dom, mbstring, openssl, gd
          coverage: none

      - name: Write Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [[ -z "$FIREBASE_SERVICE_ACCOUNT" ]]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret tanimli degil."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > cloud-bot/firebase.json

      - name: Run sync
        env:
          FIREBASE_CREDENTIALS: cloud-bot/firebase.json
          IMAGE_UPLOAD_ENDPOINT: ${{ vars.IMAGE_UPLOAD_ENDPOINT }}
          IMAGE_UPLOAD_TOKEN: ${{ secrets.IMAGE_UPLOAD_TOKEN }}
          # Kaynak site datacenter IP'lerini blokluyor; residential/mobil proxy sart.
          PROXY_URL: ${{ secrets.PROXY_URL }}
          SOURCE_BASE_URL: ${{ vars.SOURCE_BASE_URL }}
          MARKET_INTERVAL_MIN: ${{ vars.MARKET_INTERVAL_MIN }}
          DRAIN_INTERVAL_MIN: ${{ vars.DRAIN_INTERVAL_MIN }}
          DRAIN_BATCH: ${{ vars.DRAIN_BATCH }}
          BROCHURE_VALID_DAYS: ${{ vars.BROCHURE_VALID_DAYS }}
          REQUEST_DELAY_MS: ${{ vars.REQUEST_DELAY_MS }}
          ONESIGNAL_ENABLED: ${{ vars.ONESIGNAL_ENABLED }}
          ONESIGNAL_APP_ID: ${{ vars.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          ONESIGNAL_TAG_KEY: ${{ vars.ONESIGNAL_TAG_KEY }}
          ONESIGNAL_TAG_VALUE: ${{ vars.ONESIGNAL_TAG_VALUE }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          case "$MODE" in
            once-all)   FLAG="--once-all" ;;
            check-only) FLAG="--check-only" ;;
            drain-only) FLAG="--drain-only" ;;
            test-push)  FLAG="--test-push" ;;
            *)          FLAG="" ;;
          esac
          php cloud-bot/sync.php $FLAG

      - name: Commit state
        run: |
          if [[ -n "$(git status --porcelain cloud-bot/state.json)" ]]; then
            git config user.name "cloud-bot"
            git config user.email "cloud-bot@users.noreply.github.com"
            git add cloud-bot/state.json
            git commit -m "chore(cloud-bot): update sync state [skip ci]"
            # Eszamanli degisiklik olduysa rebase ederek pushla.
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          else
            echo "state.json degismedi, commit yok."
          fi
